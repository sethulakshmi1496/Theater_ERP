services:
  # Key-Value (Valkey/Redis) instance for Celery
  - type: keyvalue
    name: theater-erp-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

  # Django Backend API Web Service (Includes Celery Worker & Beat in background)
  - type: web
    name: theater-erp-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # Set manually in the dashboard to your Neon database URL
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: theater-erp-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set manually in the dashboard to the frontend URL (e.g. https://theater-erp-frontend.onrender.com)

  # React Frontend (Static Site)
  - type: web
    name: theater-erp-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_BASE
        sync: false # Set manually in the dashboard to the backend URL (e.g. https://theater-erp-backend.onrender.com)
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
