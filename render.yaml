databases:
  - name: theater-erp-db
    databaseName: aec_cinemas_db
    plan: free

services:
  # Key-Value (Valkey/Redis) instance for Celery
  - type: keyvalue
    name: theater-erp-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

  # Django Backend API Web Service
  - type: web
    name: theater-erp-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py seed_data"
    startCommand: "gunicorn aec_cinemas.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: theater-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: theater-erp-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set manually in the dashboard to the frontend URL (e.g. https://theater-erp-frontend.onrender.com)

  # Celery Worker Service (Background Tasks)
  - type: worker
    name: theater-erp-worker
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A aec_cinemas worker --loglevel=info"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: theater-erp-backend
          property: envVar
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: theater-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: theater-erp-redis
          property: connectionString

  # Celery Beat Service (Scheduled Tasks)
  - type: worker
    name: theater-erp-beat
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A aec_cinemas beat --loglevel=info"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: theater-erp-backend
          property: envVar
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: theater-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: theater-erp-redis
          property: connectionString

  # React Frontend (Static Site)
  - type: web
    name: theater-erp-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_BASE
        sync: false # Set manually in the dashboard to the backend URL (e.g. https://theater-erp-backend.onrender.com)
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
